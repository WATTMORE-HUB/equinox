version: '3.8'

services:
  llm-deployment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-deployment
    restart: always
    ports:
      - "80:80"
    environment:
      - PORT=80
      - NODE_ENV=production
      - STATE_FILE_PATH=/collect_data/state.json
      - COLLECT_DATA_PATH=/collect_data
      - DOCKER_SOCKET=/var/run/docker.sock
      - LOG_CHECK_INTERVAL=3600000  # 1 hour
      - VALIDATION_WINDOW=600000     # 10 minutes
    volumes:
      # Mount Docker socket for log analysis
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount shared data volume
      - collect_data:/collect_data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - default

  # Your other services continue here...
  # Example:
  # video-server:
  #   build:
  #     context: ./services/video-server
  #   ...

volumes:
  collect_data:
    driver: local
