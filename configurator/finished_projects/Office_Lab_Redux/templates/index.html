<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSP Video Stream</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        h1 {
            color: #ffffff;
            margin-bottom: 30px;
        }
        
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .cool-button {
          background-color: #008CBA;
          border: none;
          color: white;
          padding: 15px 32px;
          text-align: center;
          text-decoration: none;
          display: inline-block;
          font-size: 16px;
          cursor: pointer;
          border-radius: 8px;
          transition-duration: 0.4s;
        }
        
        .cool-button:hover {
          background-color: #04AA6D;
          box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
        }
        
        .cool-button:active {
          transform: scale(0.95);
        }
        
        .cool-button:disabled {
          background-color: #cccccc;
          cursor: not-allowed;
        }
        
        .button-row {
          display: flex;           /* puts children in a row */
          gap: 8px;                /* space between buttons */
        }
    </style>
</head>
<body>
    <h1>RTSP Video Stream</h1>
    <div class="video-container">
        <img src="{{ url_for('video_feed') }}" alt="Video Stream">
    </div>
    <div class="button-row">
        <button class="cool-button" onclick="sendCommand('/left')">Pan Left</button>
        <button class="cool-button" onclick="sendCommand('/up')">Tilt Up</button>
        <button class="cool-button" onclick="sendCommand('/down')">Tilt Down</button>
        <button class="cool-button" onclick="sendCommand('/right')">Pan Right</button>
        <button class="cool-button" onclick="sendCommand('/in')">Zoom In</button>
        <button class="cool-button" onclick="sendCommand('/out')">Zoom Out</button>
    </div>
    <div style="margin-top: 20px;">
        <a href="{{ url_for('embed_code') }}" style="color: #4CAF50; text-decoration: none; font-size: 16px;">📺 Get Embed Code</a>
    </div>
    
    <script>
        async function sendCommand(endpoint) {
            // Disable all buttons during command execution
            const buttons = document.querySelectorAll('.cool-button');
            buttons.forEach(btn => btn.disabled = true);
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Command successful:', data.action);
                } else {
                    console.error('Command failed:', response.statusText);
                }
            } catch (error) {
                console.error('Error sending command:', error);
            } finally {
                // Re-enable buttons after command completes
                buttons.forEach(btn => btn.disabled = false);
            }
        }
    </script>
</body>
</html>
