services:
  meter_collect:
    build:
      context: .
      dockerfile: meter_collect.Dockerfile
    container_name: meter_collect
    restart: unless-stopped

    # Persist the JSON files the script writes to /collect_data/meter
    # on the host so other services / the host OS can read them.
    volumes:
      - ./collect_data:/collect_data

    # Only needed when MODBUS_MODE=RTU.
    # Adjust the host device path to match whatever the USB-to-serial
    # adapter enumerates as on your Ubuntu host (commonly /dev/ttyUSB0).
    # Comment this block out entirely when running in TCP mode.
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"

    environment:
      # ---- Modbus mode ---------------------------------------------------
      # "RTU" for serial over USB, "TCP" for networked meters.
      MODBUS_MODE: "RTU"

      # ---- TCP target IP (used only when MODBUS_MODE=TCP) ---------------
      # The script reassembles these four parts as A.B.C.D
      IP_PART_1: "0"
      IP_PART_2: "0"
      IP_PART_3: "0"
      IP_PART_4: "0"

      # ---- RTU serial port (used only when MODBUS_MODE=RTU) -------------
      # Path *inside* the container; matches the `devices:` mapping above.
      USB: "/dev/ttyACM0"

      # ---- Register / function-code config ------------------------------
      # REGISTER_BASE is the int() base used when parsing register env
      # vars below (10 for decimal, 16 for hex like "0x200A").
      REGISTER_BASE: "16"
      FUNCTION_CODE: "3"

      # ---- Scaling factors applied to raw readings ----------------------
      M_POWER_SCALE: "1"
      M_VOLT_SCALE: "1"
      M_CURRENT_SCALE: "1"
      M_ENERGY_SUM_SCALE: "1"
      M_FREQUENCY_SCALE: "1"

      # ---- Device / site metadata written into each JSON payload --------
      DEVICE_ID: "EMS-TEST"
      METER_DEVICE_ID: "EMS-TEST-ELKOR"       # used in the TCP branch in place of DEVICE_ID
      DEVICE_READABLE_NAME: "Elkor Meter"
      DEVICE_MODEL: "Elkor Wattson Mk 2"
      SITE: "Acadia"
      EDGE_ID: "Linux IPC"

      # ---- Modbus register addresses ------------------------------------
      # These are read with int(os.getenv(...), REGISTER_BASE),
      # so format them to match REGISTER_BASE (e.g. "1000" for base=10,
      # "0x03E8" for base=16).
      POW_A: "232"
      POW_B: "234"
      POW_C: "236"
      VOLT_A: "220"
      VOLT_B: "222"
      VOLT_C: "224"
      CURR_A: "22C"
      CURR_B: "22E"
      CURR_C: "230"
      EN_SUM: "1100"
      FREQ: "20E"
      SERIAL: "51D"
