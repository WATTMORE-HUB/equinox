version: "2"

services:
  video-server:
    build:
      dockerfile: app.Dockerfile
      context: .
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    volumes:
        - "collect_data:/collect_data"
  operate-register-test:
    build:
      dockerfile: register_test.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
    restart: no
  operate-config:
    build:
      dockerfile: config.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
    restart: no
  operate-heartbeat:
    build:
      dockerfile: heartbeat.Dockerfile
      context: .
    volumes:
      - "collect_data:/collect_data"
    privileged: true
  operate-meter-collect:
    build:
      dockerfile: meter_collect.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
  operate-inverter-collect:
    build:
      dockerfile: inverter_collect.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
  operate-weather-collect:
    build:
      dockerfile: weather_collect.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
  operate-windspeed-collect:
    build:
      dockerfile: windspeed_collect.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
  operate-combine:
    build:
      dockerfile: combine.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
    environment:
        DB_HOST: postgres
        DB_NAME: jsondata
        DB_USER: dbuser
        DB_PASSWORD: dbpass
        DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_started
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: jsondata
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d jsondata"]
      interval: 10s
      timeout: 5s
      retries: 5
  equinox:
    build:
      dockerfile: equinox.Dockerfile
      context: .
    container_name: equinox
    restart: always
    ports:
      - "80:80"
    environment:
      - PORT=80
      - NODE_ENV=production
      - STATE_FILE_PATH=/collect_data/state.json
      - COLLECT_DATA_PATH=/collect_data
      - DOCKER_SOCKET=/var/run/docker.sock
      - LOG_CHECK_INTERVAL=3600000
      - VALIDATION_WINDOW=600000
      - EQUINOX_MODE=${EQUINOX_MODE}
      # AWS IoT Core Configuration (optional - set via device env vars if using)
      - IOT_PUBLISH_ENABLED=${IOT_PUBLISH_ENABLED:-false}
      - AWSENDPOINT=${AWSENDPOINT}
      - THINGNAME=${THINGNAME}
      - CERT_NAME=${CERT_NAME}
      - CERT=${CERT}
      - KEY_NAME=${KEY_NAME}
      - KEY=${KEY}
      - CA_1_NAME=${CA_1_NAME}
      - CA_1=${CA_1}
      - IOT_TOPIC=${IOT_TOPIC:-operate/device_reports}
      - SITE=${SITE}
      - EDGE_ID=${EDGE_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - collect_data:/collect_data
    depends_on:
      - monitor
  monitor:
    build:
      dockerfile: equinox_src/services/monitor.Dockerfile
      context: .
    container_name: equinox-monitor
    restart: always
    environment:
      - MONITORING_INTERVAL=300
      - SYSTEM_REPORT_INTERVAL=600
      - PYTHONUNBUFFERED=1
      # AWS IoT Core Configuration (optional - set via device env vars if using)
      - IOT_PUBLISH_ENABLED=${IOT_PUBLISH_ENABLED:-false}
      - AWSENDPOINT=${AWSENDPOINT}
      - THINGNAME=${THINGNAME}
      - CERT_NAME=${CERT_NAME}
      - CERT=${CERT}
      - KEY_NAME=${KEY_NAME}
      - KEY=${KEY}
      - CA_1_NAME=${CA_1_NAME}
      - CA_1=${CA_1}
      - IOT_TOPIC=${IOT_TOPIC:-operate/device_reports}
      - SITE=${SITE}
      - EDGE_ID=${EDGE_ID}
      - BALENA_DEVICE_UUID=${BALENA_DEVICE_UUID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - collect_data:/collect_data
    privileged: true
  ollama:
    image: ollama/ollama:latest
    container_name: equinox-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
volumes:
  postgres_data:
  collect_data:
  ollama_data:
