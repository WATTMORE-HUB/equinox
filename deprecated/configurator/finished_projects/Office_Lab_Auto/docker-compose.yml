  operate-combine:
    build:
      dockerfile: combine.Dockerfile
      context: .
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    volumes:
      - "collect_data:/collect_data"
    privileged: true
    environment:
        DB_HOST: postgres
        DB_NAME: jsondata
        DB_USER: dbuser
        DB_PASSWORD: dbpass
        DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_started
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: jsondata
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d jsondata"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  collect_data: